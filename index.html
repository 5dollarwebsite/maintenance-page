<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sito in manutenzione</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0A101F;color:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .card{text-align:center;padding:3rem 2rem;max-width:480px}
    .icon{font-size:3rem;margin-bottom:1.5rem}
    h1{font-size:1.5rem;font-weight:600;margin-bottom:0.75rem;color:#f8fafc}
    p{color:#94a3b8;line-height:1.6;font-size:0.95rem}
    .bar{width:48px;height:3px;background:#3B82F6;border-radius:9px;margin:1.5rem auto 0}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128295;</div>
    <h1>Sito in manutenzione</h1>
    <p>Il sito è temporaneamente offline per manutenzione programmata. Tornerà disponibile a breve.</p>
    <div class="bar"></div>
  </div>
</body>
</html>
